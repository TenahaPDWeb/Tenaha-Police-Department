<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Vacation Watch Form</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            margin: 20px;\n            padding: 20px;\n            background-color: #f4f4f4;\n            border: 1px solid #ccc;\n            border-radius: 5px;\n        }\n        h1 {\n            text-align: center;\n        }\n        label {\n            display: block;\n            margin: 10px 0 5px;\n        }\n        input[type=\"text\"], input[type=\"date\"], textarea {\n            width: 100%;\n            padding: 10px;\n            margin-bottom: 20px;\n            border: 1px solid #ccc;\n            border-radius: 5px;\n        }\n        button {\n            padding: 10px 15px;\n            background-color: #5cb85c;\n            color: white;\n            border: none;\n            border-radius: 5px;\n            cursor: pointer;\n        }\n        button:hover {\n            background-color: #4cae4c;\n        }\n        .print-button {\n            background-color: #007bff;\n            margin-top: 20px;\n        }\n        .print-button:hover {\n            background-color: #0056b3;\n        }\n        .checkbox {\n            margin: 20px 0;\n        }\n    </style>\n</head>\n<body>\n    <h1>Vacation Watch Form</h1>\n    <form>\n        <label for=\"fullName\">Full Name:</label>\n        <input type=\"text\" id=\"fullName\" name=\"fullName\" required>\n        \n        <label for=\"address\">Address to be Checked:</label>\n        <input type=\"text\" id=\"address\" name=\"address\" required>\n        \n        <label for=\"departureDate\">Departure Date:</label>\n        <input type=\"date\" id=\"departureDate\" name=\"departureDate\" required>\n        \n        <label for=\"returnDate\">Return Date:</label>\n        <input type=\"date\" id=\"returnDate\" name=\"returnDate\">\n        \n        <label for=\"emergencyContact\">Emergency Contact:</label>\n        <input type=\"text\" id=\"emergencyContact\" name=\"emergencyContact\" required>\n        \n        <label for=\"authorizedVisitors\">Authorized Visitors:</label>\n        <input type=\"text\" id=\"authorizedVisitors\" name=\"authorizedVisitors\">\n        \n        <label for=\"additionalNotes\">Additional Notes:</label>\n        <textarea id=\"additionalNotes\" name=\"additionalNotes\"></textarea>\n        \n        <div class=\"checkbox\">\n            <input type=\"checkbox\" id=\"acknowledgment\" name=\"acknowledgment\" required>\n            <label for=\"acknowledgment\">I acknowledge that the information provided is accurate.</label>\n        </div>\n        <button type=\"submit\">Submit</button>\n    </form>\n    <button class=\"print-button\" onclick=\"window.print()\">Print Form</button>\n</body>\n</html>
