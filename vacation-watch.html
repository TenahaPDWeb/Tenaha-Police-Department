<div class="vw-container">
  <h2>Vacation Watch Request</h2>

  <form action="vacation-watch-submit.php" method="post">

    <div class="vw-field">
      <label>Full Name</label>
      <input type="text" name="name" required>
    </div>

    <div class="vw-field">
      <label>Address to be Checked</label>
      <textarea name="address" required></textarea>
    </div>

    <div class="vw-field">
      <label>Departure Date</label>
      <input type="date" name="departure_date" required>
    </div>

    <div class="vw-field">
      <label>Return Date</label>
      <input type="date" name="return_date" required>
    </div>

    <div class="vw-field">
      <label>Local Emergency Contact (Name & Phone)</label>
      <input type="text" name="contact" required>
    </div>

    <div class="vw-field">
      <label>Authorized Visitors (Names / Vehicles)</label>
      <textarea name="visitors"></textarea>
    </div>

    <div class="vw-field">
      <label>Additional Notes</label>
      <textarea name="notes"></textarea>
    </div>

    <div class="vw-checkbox">
      <input type="checkbox" name="acknowledgment" required>
      <label>
        I hereby request a vacation watch of the listed property. I understand this service is provided as staffing allows and does not ensure continuous monitoring or guarantee against criminal activity. I agree to notify the Tenaha Police Department upon my return. I release and hold harmless the City of Tenaha, its officers, employees, and agents from any liability for loss, theft, or damage occurring during the requested period.
      </label>
    </div>

    <div class="vw-submit">
      <input type="submit" value="Submit Request">
    </div>

  </form>
</div>
